<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
     <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="icon" type="image/png" href="./assets/iamges/logo.png">
</head>
<body>
    <div class="login">
 <div class="info">
 <div class="container w-50">
 <h2 class="text-white">Welcome Back!</h2>
 <p class="text-white">Sign in to your account...</p>
 <form>
 <div class="form-floating mb-3">
 <input type="text" class="form-control" id="user" placeholder="user name" required>
 <label for="user">Name</label>
 </div>
 <div class="form-floating mb-3">
 <input type="email" class="form-control" id="gmail" placeholder="***@gmail.com" required>
 <label for="gmail">Email</label>
 </div>
 <div class="form-floating mb-3">
 <input type="password" class="form-control" id="password" placeholder="Password" required>
 <label for="password">Password</label>
 </div>
 <div class="form-floating mb-3">
 <input type="text" class="form-control" id="university" placeholder="University Name" required>
 <label for="university">University Name</label>
 </div>
 <div class="mb-4">
 <select class="form-select" name="medicalYear" required>
 <option selected disabled>Select your year</option>
 <option value="year5">Year 5</option>
 <option value="year6">Year 6</option>
 <option value="internship">Internship</option>
 </select>
 </div>
 <button type="button" class="btn btn-primary">Sign in</button>
 <button type="button" class="btn btn-primary">continue with google</button>
 </form>
 </div>
 </div>
 </div>

 <script src="./assets/js/bootstrap.bundle.min.js"></script>
 <script src="./assets/js/script.js"></script>
</body>
</html>
</body>
</html>
